spring.application.name=ms-partido
server.port=8083

# Configuración de la base de datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_partido?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/api-docs

logging.level.root=INFO
logging.level.com.ms_partido=DEBUG
# Para ver las consultas SQL en el log:
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=mi-log-aplicacion.log