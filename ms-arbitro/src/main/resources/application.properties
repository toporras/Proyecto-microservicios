spring.application.name=ms-arbitro
server.port = 8087


spring.datasource.url=jdbc:mysql://localhost:3306/db_arbitro?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Configuracion de la base de datos (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuracion de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Configuracion de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/api-docs

logging.level.root=INFO
logging.level.com.ms_arbitro=DEBUG
# Para ver las consultas SQL en el log:
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=mi-log-aplicacion.log

#Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/