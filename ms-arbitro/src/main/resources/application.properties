spring.application.name=ms-arbitro
server.port = 8087

# Configuraciï¿½n de la base de datos (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_arbitro?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuraciï¿½n de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# Configuraciï¿½n de Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true